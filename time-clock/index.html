<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Clock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ffffff;
            color: #000000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 28px 60px;
            background: #ffffff;
            border-bottom: 1px solid #e0e0e0;
            flex-shrink: 0;
        }

        /* ── Logo ── */
        .logo-area {
            min-width: 220px;
            display: flex;
            align-items: center;
        }

        .logo-area img {
            max-height: 120px;
            max-width: 360px;
            object-fit: contain;
        }

        .logo-placeholder {
            width: 180px;
            height: 52px;
            background: #e0e0e0;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            font-size: 13px;
            letter-spacing: 1px;
            border: 1px dashed #aaaaaa;
        }

        /* ── Date ── */
        .date-area {
            flex: 1;
            text-align: center;
        }

        .date-text {
            font-size: 36px;
            font-weight: 700;
            color: #222222;
            letter-spacing: 0.5px;
        }

        /* ── Weather ── */
        .weather-area {
            min-width: 280px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }

        .weather-top {
            display: flex;
            align-items: baseline;
            gap: 14px;
        }

        .weather-temp {
            font-size: 52px;
            font-weight: 700;
            line-height: 1;
            color: #000000;
        }

        .weather-desc {
            font-size: 22px;
            color: #444;
        }

        .weather-precip {
            font-size: 18px;
            color: #1a7fa8;
        }

        .weather-loading {
            font-size: 18px;
            color: #999;
        }

        /* ── Alerts ── */
        .alerts-bar {
            background: #f8f8f8;
            border-top: 1px solid #e0e0e0;
            padding: 14px 40px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 16px;
            min-height: 60px;
        }

        .alerts-label {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            white-space: nowrap;
        }

        .alerts-content {
            font-size: 20px;
            color: #222;
            flex: 1;
            transition: opacity 0.4s ease;
        }

        .alerts-content.empty {
            color: #bbb;
            font-style: italic;
            font-size: 16px;
        }

        .alerts-content.type-warning {
            color: #b85c00;
            font-weight: 600;
        }

        .alerts-content.type-urgent {
            color: #cc0000;
            font-weight: 700;
        }

        .alerts-content.type-watch {
            color: #cc9900;
            font-weight: 800;
            font-size: 32px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .alerts-content.type-severe {
            color: #cc0000;
            font-weight: 900;
            font-size: 36px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* ── Clock ── */
        .clock-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .clock {
            font-size: clamp(80px, 18vw, 320px);
            font-weight: 700;
            letter-spacing: 0.04em;
            color: #000000;
            font-family: Arial, Helvetica, sans-serif;
            text-shadow: none;
            line-height: 1;
            user-select: none;
        }
    </style>
</head>
<body>

    <div class="header">

        <!-- Logo -->
        <div class="logo-area">
            <img id="company-logo" src="logo.png" alt="Company Logo"
                 onerror="this.style.display='none'; document.getElementById('logo-placeholder').style.display='flex';">
            <div id="logo-placeholder" class="logo-placeholder" style="display:none;">COMPANY LOGO</div>
        </div>

        <!-- Date -->
        <div class="date-area">
            <div class="date-text" id="date-display"></div>
        </div>

        <!-- Weather -->
        <div class="weather-area" id="weather-area">
            <div class="weather-loading">Loading weather...</div>
        </div>

    </div>

    <!-- Clock -->
    <div class="clock-container">
        <div class="clock" id="clock-display">--:--:--</div>
    </div>

    <!-- Alerts & Notices -->
    <div class="alerts-bar">
        <div class="alerts-label">Alerts &amp; Notices</div>
        <div class="alerts-content empty" id="alerts-content">No current alerts</div>
    </div>

    <script>
        // ── Clock & Date ──────────────────────────────────────────────────
        function updateClock() {
            const now = new Date();

            let h = now.getHours() % 12 || 12;
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock-display').textContent = `${h}:${m}:${s}`;

            const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('date-display').textContent =
                now.toLocaleDateString('en-US', opts);
        }

        updateClock();
        setInterval(updateClock, 1000);

        // ── Weather (Open-Meteo — no API key required) ────────────────────
        // Coordinates for zip 44420 (Brookfield Township, OH)
        const LAT = 41.2367;
        const LON = -80.5703;

        const WMO_DESC = {
            0: 'Clear Sky',
            1: 'Mainly Clear', 2: 'Partly Cloudy', 3: 'Overcast',
            45: 'Fog', 48: 'Freezing Fog',
            51: 'Light Drizzle', 53: 'Drizzle', 55: 'Heavy Drizzle',
            61: 'Light Rain', 63: 'Rain', 65: 'Heavy Rain',
            71: 'Light Snow', 73: 'Snow', 75: 'Heavy Snow',
            77: 'Snow Grains',
            80: 'Rain Showers', 81: 'Rain Showers', 82: 'Violent Rain Showers',
            85: 'Snow Showers', 86: 'Heavy Snow Showers',
            95: 'Thunderstorm',
            96: 'Thunderstorm w/ Hail', 99: 'Thunderstorm w/ Heavy Hail'
        };

        async function fetchWeather() {
            try {
                const url =
                    `https://api.open-meteo.com/v1/forecast` +
                    `?latitude=${LAT}&longitude=${LON}` +
                    `&current=temperature_2m,weather_code` +
                    `&daily=precipitation_probability_max,snowfall_sum,weather_code` +
                    `&temperature_unit=fahrenheit` +
                    `&timezone=America%2FNew_York` +
                    `&forecast_days=1`;

                const res = await fetch(url);
                const data = await res.json();

                const tempF = Math.round(data.current.temperature_2m);
                const code = data.current.weather_code;
                const desc = WMO_DESC[code] || 'Unknown';

                const rainPct  = data.daily.precipitation_probability_max[0] ?? 0;
                const snowfall = data.daily.snowfall_sum[0] ?? 0;

                let precipLine;
                if (snowfall > 0.1) {
                    precipLine = `❄ Snow: ${snowfall}" expected · ${rainPct}% precip chance`;
                } else if (rainPct >= 20) {
                    precipLine = `🌧 Rain: ${rainPct}% chance today`;
                } else {
                    precipLine = `No significant precipitation today`;
                }

                document.getElementById('weather-area').innerHTML = `
                    <div class="weather-top">
                        <div class="weather-temp">${tempF}°F</div>
                        <div class="weather-desc">${desc}</div>
                    </div>
                    <div class="weather-precip">${precipLine}</div>
                `;
            } catch (err) {
                document.getElementById('weather-area').innerHTML =
                    `<div class="weather-loading">Weather unavailable</div>`;
            }
        }

        fetchWeather();
        setInterval(fetchWeather, 10 * 60 * 1000); // refresh every 10 minutes

        // ── Alerts ───────────────────────────────────────────────────────
        let alertsList = [];
        let alertIndex = 0;

        function showAlert() {
            const el = document.getElementById('alerts-content');
            if (alertsList.length === 0) {
                el.className = 'alerts-content empty';
                el.textContent = 'No current alerts';
                return;
            }
            const alert = alertsList[alertIndex % alertsList.length];
            el.style.opacity = 0;
            setTimeout(() => {
                el.className = 'alerts-content' + (alert.type ? ` type-${alert.type}` : '');
                el.textContent = alert.message;
                el.style.opacity = 1;
            }, 400);
            alertIndex++;
        }

        async function fetchAlerts() {
            try {
                const res = await fetch(`alerts.json?_=${Date.now()}`);
                const data = await res.json();
                alertsList = data.alerts || [];
                alertIndex = 0;
                showAlert();
            } catch (err) {
                alertsList = [];
                showAlert();
            }
        }

        fetchAlerts();
        setInterval(fetchAlerts, 60 * 1000);        // reload JSON every minute
        setInterval(showAlert, 6 * 1000);           // rotate alerts every 6 seconds
    </script>

</body>
</html>
