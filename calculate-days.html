<!DOCTYPE html>
<!--
Filename: index.html
Author: Jason Lamb
Revision: 3.0
Description: Calendar-year progress calculator anchored to selected date.
Changelog:
3.0 - Fully deterministic selected-date year model. Fixed caching and date math inconsistencies.
-->

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Year Progress Calculator</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    text-align: center;
    padding: 40px;
}

.container {
    max-width: 600px;
    margin: auto;
    background: #1e293b;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 0 20px rgba(0,0,0,0.4);
}

input {
    padding: 10px;
    font-size: 16px;
    margin: 10px 0;
    width: 220px;
}

.results {
    margin-top: 20px;
    text-align: left;
}

.progress-bar {
    height: 25px;
    background: #334155;
    border-radius: 5px;
    overflow: hidden;
    margin-top: 15px;
}

.progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #22c55e, #16a34a);
    text-align: center;
    line-height: 25px;
    color: white;
    font-weight: bold;
    transition: width 0.6s ease;
}
</style>
</head>

<body>

<div class="container">
    <h1>Year Progress Calculator</h1>
    <p>Select reference date (defaults to today):</p>

    <input type="date" id="startDate">

    <div class="results" id="results"></div>

    <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
    </div>
</div>

<script>

const msPerDay = 1000 * 60 * 60 * 24;

// Remove time component
function stripTime(date) {
    return new Date(date.getFullYear(), date.getMonth(), date.getDate());
}

// Safe local ISO parse
function parseLocalDate(input) {
    const parts = input.split("-");
    return new Date(parts[0], parts[1] - 1, parts[2]);
}

function calculate() {

    const inputValue = document.getElementById("startDate").value;
    if (!inputValue) return;

    const selectedDate = stripTime(parseLocalDate(inputValue));
    const year = selectedDate.getFullYear();

    const yearStart = new Date(year, 0, 1);
    const yearEnd = new Date(year, 11, 31);
    const nextYearStart = new Date(year + 1, 0, 1);

    const totalYearDays = (nextYearStart - yearStart) / msPerDay;

    const daysSinceStart = Math.floor((selectedDate - yearStart) / msPerDay);
    const daysUntilEnd = Math.floor((yearEnd - selectedDate) / msPerDay);

    const percentComplete = ((daysSinceStart / totalYearDays) * 100).toFixed(2);

    document.getElementById("results").innerHTML = `
        <h3>Calendar Year ${year}</h3>
        <p><strong>Reference Date:</strong> ${inputValue}</p>

        <br>

        <p><strong>Time Since 1/1/${year}</strong></p>
        <p>Days: ${daysSinceStart}</p>
        <p>Weeks: ${(daysSinceStart / 7).toFixed(2)}</p>
        <p>Months: ${(daysSinceStart / 30.44).toFixed(2)}</p>

        <br>

        <p><strong>Time Until 12/31/${year}</strong></p>
        <p>Days: ${daysUntilEnd}</p>
        <p>Weeks: ${(daysUntilEnd / 7).toFixed(2)}</p>
        <p>Months: ${(daysUntilEnd / 30.44).toFixed(2)}</p>

        <br>

        <p><strong>Percent of Year Complete:</strong> ${percentComplete}%</p>
    `;

    const progressFill = document.getElementById("progressFill");
    progressFill.style.width = percentComplete + "%";
    progressFill.textContent = percentComplete + "%";
}

// Default to today on load
window.onload = function() {

    const today = new Date();
    const isoToday = today.toISOString().split("T")[0];

    const input = document.getElementById("startDate");
    input.value = isoToday;

    calculate();
    input.addEventListener("change", calculate);
};

</script>

</body>
</html>
