<!DOCTYPE html>
<!--
Filename: index.html
Author: Jason Lamb
Revision: 1.4
Description: Year progress calculator with deterministic year boundary math.
Changelog:
1.1 - Default to today, auto-calc on load.
1.2 - Fixed UTC date parsing issues.
1.3 - Display selected ISO date to avoid timezone shifts.
1.4 - Rewrote year math to use Jan 1 → Jan 1 next year boundary model.
-->

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Year Progress Calculator</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    text-align: center;
    padding: 40px;
}

.container {
    max-width: 600px;
    margin: auto;
    background: #1e293b;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 0 20px rgba(0,0,0,0.4);
}

input {
    padding: 10px;
    font-size: 16px;
    margin: 10px 0;
    width: 220px;
}

.results {
    margin-top: 20px;
    text-align: left;
}

.progress-bar {
    height: 25px;
    background: #334155;
    border-radius: 5px;
    overflow: hidden;
    margin-top: 15px;
}

.progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #22c55e, #16a34a);
    text-align: center;
    line-height: 25px;
    color: white;
    font-weight: bold;
    transition: width 0.6s ease;
}
</style>
</head>

<body>

<div class="container">
    <h1>Year Progress Calculator</h1>
    <p>Start date (defaults to today):</p>

    <input type="date" id="startDate">

    <div class="results" id="results"></div>

    <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
    </div>
</div>

<script>

const msPerDay = 1000 * 60 * 60 * 24;

// Parse ISO date safely as local date
function parseLocalDate(input) {
    const parts = input.split("-");
    return new Date(parts[0], parts[1] - 1, parts[2]);
}

// Remove time portion
function stripTime(date) {
    return new Date(date.getFullYear(), date.getMonth(), date.getDate());
}

function calculate() {

    const startDateInput = document.getElementById("startDate").value;
    if (!startDateInput) return;

    const today = stripTime(new Date());
    const startDate = stripTime(parseLocalDate(startDateInput));

    // ---- Time Since Start Date ----
    let elapsedDays = Math.floor((today - startDate) / msPerDay);
    if (elapsedDays < 0) elapsedDays = 0;

    const elapsedWeeks = (elapsedDays / 7).toFixed(2);
    const elapsedMonths = (elapsedDays / 30.44).toFixed(2);

    // ---- Year Progress (Jan 1 → Jan 1 next year) ----
    const year = today.getFullYear();
    const yearStart = new Date(year, 0, 1);
    const nextYearStart = new Date(year + 1, 0, 1);

    const totalYearDays = (nextYearStart - yearStart) / msPerDay;
    const daysIntoYear = (today - yearStart) / msPerDay;
    const daysRemaining = totalYearDays - daysIntoYear;

    const percentComplete = ((daysIntoYear / totalYearDays) * 100).toFixed(2);
    const weeksRemaining = (daysRemaining / 7).toFixed(2);
    const monthsRemaining = (daysRemaining / 30.44).toFixed(2);

    // ---- Render ----
    document.getElementById("results").innerHTML = `
        <h3>Time Since ${startDateInput}</h3>
        <p><strong>Days:</strong> ${elapsedDays}</p>
        <p><strong>Weeks:</strong> ${elapsedWeeks}</p>
        <p><strong>Months:</strong> ${elapsedMonths}</p>

        <h3>Year ${year} Progress</h3>
        <p><strong>Percent Complete:</strong> ${percentComplete}%</p>
        <p><strong>Days Remaining:</strong> ${Math.floor(daysRemaining)}</p>
        <p><strong>Weeks Remaining:</strong> ${weeksRemaining}</p>
        <p><strong>Months Remaining:</strong> ${monthsRemaining}</p>
    `;

    const progressFill = document.getElementById("progressFill");
    progressFill.style.width = percentComplete + "%";
    progressFill.textContent = percentComplete + "%";
}

// ---- On Load ----
window.onload = function() {
    const today = new Date();
    const isoToday = today.toISOString().split("T")[0];
    const input = document.getElementById("startDate");

    input.value = isoToday;

    calculate();
    input.addEventListener("change", calculate);
};

</script>

</body>
</html>
